# rr_rea — RouteRTL Embedded Analyzer (REA)
#
# First-party debug IP — vendor-neutral on-chip logic analyzer,
# JTAG-attached. Drop-in replacement for fcapz_ela_xilinx7 at the
# JTAG register interface (fcapz host SW connects unmodified).
#
# Why first-party: fcapz's RTL gates the dpram write on `armed`,
# which leaves uninit BRAM cells in the captured window when the
# trigger fires before pretrig_len cycles have elapsed. rr_rea
# implements sliding-window-from-day-one — the dpram records
# continuously from reset deassertion, matching the standard ILA
# model (Vivado ChipScope, Intel SignalTap, ARM ELA).
#
# VHDL throughout; modular; each block has its own contract +
# cocotb testbench per ROUTERTL conventions. The Xilinx BSCANE2
# wrapper has a behavioral _sim.vhd mock so the full hierarchy
# runs untouched in simulation.
#
# RTL-P3.272.

name: rea
namespace: routertl
description: >-
  RouteRTL Embedded Analyzer — vendor-neutral on-chip logic analyzer
  IP, JTAG-attached. Sliding-window-from-day-one capture, fcapz host
  SW compatible at the JTAG register layer. VHDL, modular, contract-
  first.
license: MIT
homepage: https://github.com/djmazure/routertl-tool-index
maintainer: Daniel J. Mazure (djmazure)
version: 0.3.1
status: alpha

install:
  local: tools/routertl/rea/

pairs_with: [rea]
vendor_compat: [xilinx7, xilinxus, intel, ecp5, gowin]
interfaces: [jtag]
tags: [debug, jtag, waveform, embedded-analyzer, rea, ila, sliding-window]
pairs_with_ips: []
